<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="Página para comparação de valores de corridas.">
    <meta name="author" content="Daniel Vicalvi">
    <title>Divergência de Valores</title>

    <link rel="stylesheet" href="style.css?v=2.2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        integrity="sha512-..." crossorigin="anonymous">
</head>

<body>
    <header>
        <div class="header-content">
            <h1><i class="fas fa-chart-line"></i> Divergência de Valores</h1>
            <p>Sistema de análise de corridas e detecção de anomalias</p>
        </div>
    </header>

    <form id="controls" role="toolbar" aria-label="Controles de filtragem e processamento">
        <label for="fileInput" class="custom-file-upload">
            <i class="fas fa-file-upload"></i> Selecionar Arquivo
        </label>
        <input type="file" id="fileInput" accept=".csv">

        <div class="filter-group">
            <button type="button" id="btn-finished-plus" class="btn-filter" aria-label="Exibir finalizadas com diferença maior que 20%">
                <i class="fas fa-arrow-up"></i> Finalizadas +
            </button>

            <button type="button" id="btn-finished" class="btn-filter" aria-label="Exibir finalizadas com diferença menor que 20%">
                <i class="fas fa-arrow-down"></i> Finalizadas -
            </button>

            <div class="filter-subgroup">
                <button type="button" id="btn-canceled" class="btn-filter" aria-label="Exibir corridas canceladas">
                    <i class="fas fa-times-circle"></i> Canceladas
                </button>

                <button type="button" id="btn-canceled-all" class="btn-filter-secondary" aria-label="Incluir todas as corridas canceladas">
                    <i class="fas fa-list"></i> Incluir Todas
                </button>
            </div>

            <button type="button" id="btn-highValue" class="btn-filter" aria-label="Exibir corridas acima de R$100">
                <i class="fas fa-money-bill-wave"></i> &gt; R$ 100
            </button>
        </div>
    </form>

    <main id="result">
        <div class="table-container">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>Nº OS</th>
                        <th>Status</th>
                        <th>Motorista</th>
                        <th>Forma de pagamento</th>
                        <th>Estimativa do Valor</th>
                        <th>Valor da Corrida</th>
                        <th>Diferença</th>
                        <th>Taxa Extra</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>

    <div id="loadingMessage" class="loading" style="display:none;" aria-live="polite">
        <div class="spinner"></div>
        <p>Processando arquivo, aguarde...</p>
    </div>

    <nav id="pagination" aria-label="Paginação"></nav>

    <!-- MODAL DE DETALHES -->
    <div id="detailsModal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Detalhes da Corrida Cancelada</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Conteúdo dinâmico -->
            </div>
            <div class="modal-footer">
                <button class="btn-delete" onclick="deleteRide()">
                    <i class="fas fa-trash"></i> Excluir
                </button>
                <button class="btn-close" onclick="closeModal()">Fechar</button>
            </div>
        </div>
    </div>

    <!-- OVERLAY DO MODAL -->
    <div id="modalOverlay" class="modal-overlay" style="display:none;" onclick="closeModal()"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js" defer></script>
    <script src="script.js?v=2.2" defer></script>
</body>

</html>
